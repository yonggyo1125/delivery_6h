name: Deploy to Amazon EC2
on:
  push:
    branches: [ "main" ] # main 브랜치 merge 트리거 되었을 경우

env:
  REGISTRY: ghcr.io # 깃허브 컨테이너 저장소를 사용한다.
  IMAGE_NAME: yonggyo1125/delivery6th
  VERSION: latest

jobs:
  Deploy:
    name: Build Docker Image and Deploy EC2 #도커 이미지를 만들고 EC2에 배포
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    environment: deploy
    steps:
      - name: Checkout source code # 소스코드 체크 아웃
        uses: actions/checkout@v4

      - name: Set up JDK # JDK 지정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Build container image # 도커 이미지 생성
        run: |
          IMAGE=$REGISTRY/$IMAGE_NAME:$VERSION
           chmod +x gradlew
           ./gradlew bootJar
           docker build -t $IMAGE .
           echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

      - name: Log into container registry # 깃허브 이미지 컨테이너 로그인 및 push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Executing remote ssh commands # AWS EC2 서버 SSH로 접속하고 deploy.sh 실행
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.REMOTE_IP }} # 인스턴스 IP
          username: ${{ secrets.REMOTE_USER }} # 우분투 아이디
          key: ${{ secrets.REMOTE_PRIVATE_KEY }} # ec2 instance pem key
          port: ${{ secrets.REMOTE_SSH_PORT }} # 접속포트
          script: |
            echo "배포 시작"
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker rmi ${{ env.IMAGE_URI }} || true

            echo "GHCR 로그인"
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "이미지 Pull"
            sudo docker pull ${{ env.IMAGE_URI }}

            sudo docker run -d --name myapp -p 3000:3000 \
            -e DB_URL=${{ secrets.DB_URL }} \
            -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_DDL_AUTO=update \
            -e KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }} \
            -e KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }} \
            -e KEYCLOAK_ADMIN_USERNAME=${{ secrets.KEYCLOAK_ADMIN_USERNAME }} \
            -e KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }} \
            -e KAKAO_API_KEY=${{ secrets.KAKAO_API_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            ${{ env.IMAGE_URI }}